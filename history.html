<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Quality History</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
}
</script>
<style>
/* Additional history page specific styles */
.history-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
}
.page-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
}
.history-table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow-x: auto;
    margin-top: 20px;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    text-align: left;
}
th, td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
}
th {
    background: rgba(255,255,255,0.02);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
}
tr:hover {
    background: rgba(255,255,255,0.03);
}
.text-right { text-align: right; }
.back-btn {
    color: var(--muted);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    transition: color 0.3s;
}
.back-btn:hover { color: var(--text); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><strong>AirWatch</strong> · daily history</div>
  <div style="display:flex;align-items:center;gap:15px;flex-wrap:wrap;justify-content:flex-end;">
    <button onclick="toggleTheme()" class="theme-toggle" style="background:none; border:none; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; padding: 4px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <span id="time-display" style="font-family:var(--mono);font-size:12px;color:var(--muted);"></span>
  </div>
</div>

<div class="history-container">
    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Dashboard
    </a>
    
    <div class="page-title">Daily Averages</div>
    
    <div class="chart-card" style="height: 350px; margin-bottom: 20px;">
        <div class="chart-header">PM2.5 Daily Average Trend</div>
        <div class="chart-container">
            <canvas id="dailyChart"></canvas>
        </div>
    </div>
    
    <div class="history-table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th class="text-right">Indoor PM2.5</th>
                    <th class="text-right">Outdoor PM2.5</th>
                    <th class="text-right">Indoor CO2 (ppm)</th>
                    <th class="text-right">Indoor Gas</th>
                </tr>
            </thead>
            <tbody id="history-tbody">
                <tr><td colspan="5" style="text-align:center; padding: 20px; color: var(--muted);">Loading...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
function toggleTheme() {
    let current = document.documentElement.getAttribute('data-theme');
    let target = current === 'light' ? 'dark' : 'light';
    if (target === 'dark') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', target);
}

function fmt(d) {
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function updateClock() {
  if(document.getElementById('time-display')) {
      document.getElementById('time-display').textContent = fmt(new Date());
  }
}
updateClock();
setInterval(updateClock, 1000);

async function loadHistory() {
    try {
        const res = await fetch('http://localhost:3000/api/history/daily');
        const data = await res.json();
        
        if (!data || data.length === 0) {
            document.getElementById('history-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px; color: var(--muted);">No data available yet</td></tr>';
            return;
        }

        // --- Render Table ---
        const tbody = document.getElementById('history-tbody');
        tbody.innerHTML = '';
        data.forEach(row => {
            const dateObj = new Date(row.date);
            const dateStr = dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-family: var(--mono);">${dateStr}</td>
                <td class="text-right" style="color: ${row.avg_in_pm > 35 ? 'var(--red)' : 'var(--green)'}; font-family: var(--mono); font-weight: 500;">${row.avg_in_pm || 0}</td>
                <td class="text-right" style="font-family: var(--mono);">${row.avg_out_pm || 0}</td>
                <td class="text-right" style="font-family: var(--mono);">${row.avg_in_co2 || 0}</td>
                <td class="text-right" style="font-family: var(--mono);">${row.avg_in_gas || 0}</td>
            `;
            tbody.appendChild(tr);
        });

        // --- Render Chart ---
        const labels = data.map(d => {
            const dateObj = new Date(d.date);
            return dateObj.toLocaleDateString('th-TH', { month: 'short', day: 'numeric' });
        }).reverse(); // Reverse for chart (oldest first)
        
        const inPm = data.map(d => d.avg_in_pm).reverse();
        const outPm = data.map(d => d.avg_out_pm).reverse();

        const ctx = document.getElementById('dailyChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar', // Using bar chart for daily data to visualize volume distinctly
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Indoor PM2.5 (Avg)',
                        data: inPm,
                        backgroundColor: 'rgba(63, 185, 80, 0.8)',
                        borderColor: '#3fb950',
                        borderWidth: 1,
                        borderRadius: 4,
                        maxBarThickness: 40
                    },
                    {
                        label: 'Outdoor PM2.5 (Avg)',
                        data: outPm,
                        backgroundColor: 'rgba(88, 166, 255, 0.8)',
                        borderColor: '#58a6ff',
                        borderWidth: 1,
                        borderRadius: 4,
                        maxBarThickness: 40
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { color: '#7d8590', font: { family: "'IBM Plex Mono', monospace", size: 11 } }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(22, 27, 34, 0.9)',
                        titleColor: '#e6edf3',
                        bodyColor: '#e6edf3',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#7d8590', font: { size: 10 } } },
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7d8590', font: { size: 10 } } }
                }
            }
        });

    } catch (err) {
        console.error('Failed to fetch history:', err);
        document.getElementById('history-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px; color: var(--red);">Failed to load data</td></tr>';
    }
}

loadHistory();
</script>
</body>
</html>
